# Traefik v3 Static Configuration
# This file is loaded once at startup. Restart Traefik to apply changes.

# ─── GLOBAL ───────────────────────────────────────────────────────────────────
global:
  checkNewVersion: false
  sendAnonymousUsage: false

# ─── LOGGING ──────────────────────────────────────────────────────────────────
log:
  level: INFO # DEBUG | INFO | WARN | ERROR

accessLog:
  filePath: "/var/log/traefik/access.log"
  bufferingSize: 100
  filters:
    statusCodes:
      - "400-599" # only log errors in access log

# ─── API / DASHBOARD ──────────────────────────────────────────────────────────
api:
  dashboard: true
  insecure: false # dashboard only accessible via HTTPS with basic auth

# ─── ENTRYPOINTS ──────────────────────────────────────────────────────────────
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
    # HTTP/3 (QUIC) — optional but fast
    http3:
      advertisedPort: 443

# ─── CERTIFICATE RESOLVER (Let's Encrypt) ─────────────────────────────────────
certificatesResolvers:
  letsencrypt:
    acme:
      email: davidschmid121186@gmail.com
      storage: /acme.json
      httpChallenge:
        entryPoint: web

# ─── PROVIDERS ────────────────────────────────────────────────────────────────
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false # containers must opt-in with traefik.enable=true
    network: proxy # default network for routing
    watch: true # auto-detect new containers


  # Optional: file-based dynamic config (for non-Docker services)
  # file:
  #   directory: /etc/traefik/dynamic
  #   watch: true

# ─── METRICS (optional — exposes /metrics for Prometheus) ─────────────────────
# metrics:
#   prometheus:
#     addEntryPointsLabels: true
#     addServicesLabels: true
