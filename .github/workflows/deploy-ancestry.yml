name: Deploy ancestry

on:
  push:
    branches: [main]
    paths:
      - "apps/ancestry/**"
      - ".github/workflows/deploy-ancestry.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/ancestry
  APP_DIR: apps/ancestry

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=ancestry
          cache-to: type=gha,mode=max,scope=ancestry

  deploy:
    name: Deploy on VPS
    runs-on: self-hosted
    needs: build
    environment: production
    if: github.repository_owner == 'dawei7' && github.ref == 'refs/heads/main'

    steps:
      - name: Pull & restart
        env:
          IMAGE: ${{ env.IMAGE }}
        run: |
          set -e
          cd /opt/server
          docker compose pull ancestry
          docker compose up -d --no-deps ancestry
          docker image prune -f
          echo "ancestry deployed ✓"
