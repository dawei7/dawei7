# This workflow deploys the full server stack (infrastructure services).
# Runs directly on the self-hosted runner on the VPS — no inbound SSH needed.

name: Deploy Server Stack

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to dawei7.com
    runs-on: self-hosted
    environment: production
    if: github.repository_owner == 'dawei7' && github.ref == 'refs/heads/main'

    steps:
      - name: Pull latest config & restart stack
        run: |
          set -e
          cd /opt/server

          echo "Pulling latest config..."
          git fetch origin main
          git reset --hard origin/main

          echo "Pulling latest images..."
          docker compose pull --ignore-buildable

          echo "Building local images..."
          docker compose build socket-proxy

          echo "Restarting services..."
          docker compose up -d --remove-orphans

          echo "Cleaning up old images..."
          docker image prune -f

          echo "Deploy complete ✓"
