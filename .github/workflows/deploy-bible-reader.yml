name: Deploy bible-reader

on:
  push:
    branches: [main]
    paths:
      - "apps/bible-reader/**"
      - ".github/workflows/deploy-bible-reader.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/bible-reader
  APP_DIR: apps/bible-reader

jobs:
  build-and-deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.APP_DIR }}
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/server
            docker compose pull bible-reader
            docker compose up -d --no-deps bible-reader
            docker image prune -f
            echo "bible-reader deployed ✓"
