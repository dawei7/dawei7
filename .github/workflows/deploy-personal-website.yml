name: Deploy personal-website

on:
  push:
    branches: [main]
    paths:
      - "apps/personal-website/**"
      - ".github/workflows/deploy-personal-website.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/personal-website
  APP_DIR: apps/personal-website

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.APP_DIR }}
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on VPS
    runs-on: self-hosted
    needs: build

    steps:
      - name: Pull & restart
        env:
          IMAGE: ${{ env.IMAGE }}
        run: |
          set -e
          cd /opt/server
          docker compose pull personal-website
          docker compose up -d --no-deps personal-website
          docker image prune -f
          echo "personal-website deployed ✓"
